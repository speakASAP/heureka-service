apiVersion: v1
kind: ConfigMap
metadata:
  name: heureka-service-config
  namespace: statex-apps
  labels:
    app: heureka-service
    managed-by: k8s-migration
data:
  NODE_ENV: "production"
  SERVICE_NAME: "heureka-service"
  DOMAIN: "heureka.alfares.cz"
  PORT: "3000"
  # Add environment variables from .env that are non-sensitive (no secrets, API keys, passwords)
  # Examples:
  # DATABASE_POOL_SIZE: "10"
  # LOG_LEVEL: "info"
  DB_HOST: "192.168.88.53"
  DB_PORT: "5432"
  DB_USER: "dbadmin"
  DB_NAME: "heureka"
  DB_SYNC: "false"
  DB_AUTO_CREATE: "true"
  # TIMEOUT_MS: "30000"
