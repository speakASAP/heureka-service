apiVersion: v1
kind: ConfigMap
metadata:
  name: heureka-config
  namespace: statex-apps
  labels:
    app: heureka-service
    managed-by: k8s-migration
data:
  NODE_ENV: "production"
  SERVICE_NAME: "heureka-service"
  DOMAIN: "heureka.alfares.cz"
  HEUREKA_SERVICE_PORT: "3800"
  HEUREKA_SERVICE_URL: "http://heureka-service:3800"
  API_GATEWAY_PORT: "3801"
  AUKRO_SERVICE_URL: "http://aukro-service:3700"
  GATEWAY_PROXY_PORT: "3804"
  GATEWAY_TIMEOUT: "30000"
  HTTP_TIMEOUT: "30000"
  AUTH_SERVICE_URL: "http://auth-microservice:3370"
  ORDER_SERVICE_URL: "http://orders-microservice:3203"
  CATALOG_SERVICE_URL: "http://catalog-microservice:3200"
  WAREHOUSE_SERVICE_URL: "http://warehouse-microservice:3201"
  LOGGING_SERVICE_URL: "http://logging-microservice:3367"
  NOTIFICATION_SERVICE_URL: "http://notifications-microservice:3368"
  RABBITMQ_URL: "amqp://guest:guest@statex_rabbitmq:5672"
  # Add environment variables from .env that are non-sensitive (no secrets, API keys, passwords)
  # Examples:
  # DATABASE_POOL_SIZE: "10"
  # LOG_LEVEL: "info"
  DB_HOST: "db-server-postgres"
  DB_PORT: "5432"
  DB_USER: "dbadmin"
  DB_NAME: "heureka"
  DB_SYNC: "false"
  DB_AUTO_CREATE: "true"
  # TIMEOUT_MS: "30000"
